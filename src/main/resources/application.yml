spring:
  application:
    name: zzp-ai-agent
  ai:
    dashscope:
      # 需要替换为你自己的 key
      api-key: sk-c7dd642e955f46108b016eb79720de20
      chat:
        options:
          model: qwen-plus
server:
  port: 8123
  servlet:
    context-path: /api
# springdoc-openapi
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.zzp.zzpaiagent.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn


